        <div class="gallery__intro">
            <p class="gallery__eyebrow">Colección visual</p>
            <h1>Momentos en Casona Fundo El Castillo</h1>
            <p>Una selección cuidada de nuestros espacios, jardines y rincones emblemáticos. Usa las flechas o las miniaturas para navegar.</p>
